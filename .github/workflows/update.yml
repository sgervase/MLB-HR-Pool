name: Update HR Pool Standings

on:
  # Runs every 2 hours between 11am–1am UTC (covers full MLB game day)
  schedule:
    - cron: "0 8,12,15,17,20,22 * * *"
  # Also lets anyone trigger a manual refresh from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-standings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stats & generate page
        run: python fetch_stats.py

      - name: Commit updated standings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html player_id_cache.json
          git diff --staged --quiet || git commit -m "chore: update standings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
